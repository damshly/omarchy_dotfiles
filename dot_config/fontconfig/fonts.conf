<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- 1. تعيين الخطوط المفضلة لعائلة الـ Monospace (التيرمينال والكود) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family> <!-- الأساسي للإنجليزي والرموز -->
      <family>Noto Naskh Arabic UI</family>   <!-- الأساسي للعربي -->
    </prefer>
  </alias>

  <!-- 2. تعيين الخطوط المفضلة لعائلة الـ Sans-Serif (واجهات التطبيقات) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>JetBrainsMono Nerd Font</family> <!-- هيك بصير شكل النظام "تقني" حتى بالإنجليزي -->
      <family>Noto Naskh Arabic UI</family>
    </prefer>
  </alias>

  <!-- 3. إجبار النظام على استخدام هذا الترتيب (Font Matching Rule) -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
      <string>Noto Naskh Arabic UI</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
      <string>Noto Naskh Arabic UI</string>
    </edit>
  </match>

</fontconfig>
